<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — StudyAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d; color: #e8e8e8; min-height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 16px 24px; border-bottom: 1px solid #1e1e1e;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: #0d0d0d; z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: #00d4aa; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn-estudar {
            background: #00d4aa; color: #0d0d0d;
            padding: 8px 18px; border-radius: 10px;
            text-decoration: none; font-size: 13px; font-weight: 800;
        }
        .back-link { color: #444; text-decoration: none; font-size: 13px; font-weight: 600; }
        .back-link:hover { color: #00d4aa; }

        .container { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }

        /* LOADING */
        .loading-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 100px 20px; gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #1e1e1e;
            border-top-color: #00d4aa; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY */
        .empty-state { text-align: center; padding: 100px 20px; }
        .empty-state h2 { font-size: 22px; margin-bottom: 8px; }
        .empty-state p { color: #555; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
        .btn-comecar {
            display: inline-block; background: #00d4aa; color: #0d0d0d;
            padding: 14px 32px; border-radius: 12px;
            text-decoration: none; font-size: 15px; font-weight: 800;
        }

        /* ── SEÇÕES ── */
        .section { margin-bottom: 24px; }
        .section-title {
            font-size: 11px; font-weight: 800; color: #333;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
        }

        /* HERO STATS */
        .hero-stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) { .hero-stats { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: #111; border: 1px solid #1e1e1e; border-radius: 16px;
            padding: 20px 18px;
        }
        .stat-card.destaque { border-color: #00d4aa33; background: linear-gradient(135deg, #0a1a16, #111); }
        .stat-icon { font-size: 22px; margin-bottom: 10px; }
        .stat-num { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-num.streak-num { color: #f59e0b; }
        .stat-num.teal { color: #00d4aa; }
        .stat-label { font-size: 11px; color: #444; font-weight: 600; }
        .stat-sub { font-size: 11px; color: #333; margin-top: 4px; }

        /* MISSÃO DO DIA */
        .missao-card {
            background: linear-gradient(135deg, #0a1f1a 0%, #111 100%);
            border: 1px solid #00d4aa44; border-radius: 18px; padding: 24px 26px;
            margin-bottom: 24px; display: flex; align-items: flex-start; gap: 18px;
        }
        .missao-icon { font-size: 36px; flex-shrink: 0; }
        .missao-body { flex: 1; }
        .missao-label { font-size: 10px; font-weight: 800; color: #00d4aa; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
        .missao-titulo { font-size: 20px; font-weight: 900; color: #f0f0f0; margin-bottom: 6px; line-height: 1.3; }
        .missao-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 14px; }
        .missao-meta { display: flex; gap: 10px; flex-wrap: wrap; }
        .missao-tag {
            font-size: 11px; font-weight: 700; padding: 4px 12px;
            border-radius: 8px; background: #0a1f1a; color: #00d4aa;
            border: 1px solid #00d4aa22;
        }
        .btn-missao {
            background: #00d4aa; color: #0d0d0d; border: none;
            padding: 12px 22px; border-radius: 12px; font-size: 14px;
            font-weight: 800; cursor: pointer; text-decoration: none;
            display: inline-block; flex-shrink: 0; align-self: center;
            transition: background 0.2s;
        }
        .btn-missao:hover { background: #00bfa0; }

        /* ALERTA */
        .alerta { display: none; }
        .alerta.show {
            display: flex; align-items: flex-start; gap: 12px;
            background: #1f180a; border: 1px solid #f59e0b33;
            border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
        }
        .alerta-icon { font-size: 20px; flex-shrink: 0; }
        .alerta-texto { font-size: 13px; color: #f59e0b; line-height: 1.5; }

        /* DOMÍNIO POR TEMA */
        .temas-lista { display: flex; flex-direction: column; gap: 10px; }
        .tema-row {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 16px 18px; display: flex; align-items: center; gap: 14px;
            transition: border-color 0.2s;
        }
        .tema-row:hover { border-color: #2a2a2a; }
        .tema-row.concluido { border-color: #00d4aa22; }
        .tema-row.revisao-urgente { border-color: #f59e0b33; }
        .tema-row.baixo-dominio { border-left: 3px solid #f87171; }

        .tema-status-icon { font-size: 18px; flex-shrink: 0; }
        .tema-info { flex: 1; min-width: 0; }
        .tema-nome-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .tema-nome { font-size: 14px; font-weight: 700; color: #e8e8e8; }
        .tema-vel {
            font-size: 10px; font-weight: 700; padding: 2px 8px;
            border-radius: 6px;
        }
        .vel-rapida { background: #0a1f1a; color: #00d4aa; }
        .vel-lenta { background: #1f1a0a; color: #f59e0b; }

        .tema-barra-bg { height: 6px; background: #1e1e1e; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .tema-barra-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .barra-high { background: linear-gradient(90deg, #00d4aa, #00bfa0); }
        .barra-mid  { background: linear-gradient(90deg, #f59e0b, #e08e00); }
        .barra-low  { background: linear-gradient(90deg, #f87171, #e05555); }

        .tema-footer { display: flex; align-items: center; gap: 12px; font-size: 11px; color: #444; flex-wrap: wrap; }
        .tema-footer .revisao-badge { color: #f59e0b; font-weight: 600; }
        .tema-footer .concluido-badge { color: #00d4aa; font-weight: 600; }

        /* SPARKLINE por tema */
        .sparkline { flex-shrink: 0; }
        svg.spark { display: block; }

        .tema-dominio-num {
            font-size: 20px; font-weight: 900; flex-shrink: 0; min-width: 52px; text-align: right;
        }
        .dom-high { color: #00d4aa; }
        .dom-mid  { color: #f59e0b; }
        .dom-low  { color: #f87171; }

        /* REVISÕES */
        .revisoes-lista { display: flex; flex-direction: column; gap: 8px; }
        .revisao-row {
            background: #111; border: 1px solid #1e1e1e; border-radius: 12px;
            padding: 14px 18px; display: flex; align-items: center; gap: 14px;
        }
        .rev-urgencia {
            font-size: 11px; font-weight: 800; padding: 4px 12px;
            border-radius: 8px; white-space: nowrap;
        }
        .rev-hoje       { background: #2e1a1a; color: #f87171; }
        .rev-amanha     { background: #1f1a0a; color: #f59e0b; }
        .rev-semana     { background: #1a1a2e; color: #7aa2f7; }
        .rev-futura     { background: #1a1a1a; color: #444; }
        .rev-nome { font-size: 13px; font-weight: 600; flex: 1; }
        .rev-dominio { font-size: 13px; font-weight: 800; }

        /* ERROS RECORRENTES */
        .erros-lista { display: flex; flex-direction: column; gap: 8px; }
        .erro-item {
            background: #111; border: 1px solid #1e1e1e;
            border-left: 3px solid #f8717155; border-radius: 10px;
            padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px;
        }
        .erro-tema { font-size: 11px; font-weight: 700; color: #f87171; margin-bottom: 3px; }
        .erro-texto { font-size: 12px; color: #666; line-height: 1.4; }

        /* EVOLUÇÃO SEMANAL */
        .evolucao-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .evolucao-dia {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .evolucao-barra-bg {
            width: 28px; background: #1e1e1e; border-radius: 4px; overflow: hidden;
            height: 80px; display: flex; align-items: flex-end;
        }
        .evolucao-barra-fill {
            width: 100%; border-radius: 4px 4px 0 0;
            background: linear-gradient(to top, #00d4aa, #00d4aa88);
            transition: height 0.8s ease;
        }
        .evolucao-barra-fill.vazio { background: #222; }
        .evolucao-label { font-size: 10px; color: #444; font-weight: 600; }
        .evolucao-hoje .evolucao-label { color: #00d4aa; }
        .evolucao-hoje .evolucao-barra-bg { border: 1px solid #00d4aa33; }

        /* TIMELINE */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .timeline-item {
            display: flex; gap: 14px; padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-dot {
            width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
            background: #00d4aa; margin-top: 5px;
        }
        .timeline-data { font-size: 11px; color: #444; min-width: 70px; margin-top: 2px; }
        .timeline-texto { font-size: 13px; color: #ccc; line-height: 1.4; }
        .timeline-dominio { font-size: 11px; color: #00d4aa; font-weight: 700; }

        /* DOIS LADOS */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

        /* MOTIVAÇÃO */
        .motivacao-box {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 20px 22px; text-align: center; font-size: 15px;
            color: #888; line-height: 1.7; font-style: italic; margin-bottom: 24px;
        }
        .motivacao-box em { color: #00d4aa; font-style: normal; font-weight: 700; }

        /* PRÓXIMO NÍVEL */
        .proximo-nivel {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 16px 20px; margin-bottom: 24px;
        }
        .pn-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .pn-titulo { font-size: 12px; font-weight: 700; color: #555; }
        .pn-pct { font-size: 13px; font-weight: 800; color: #00d4aa; }
        .pn-barra-bg { height: 8px; background: #1e1e1e; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .pn-barra-fill { height: 100%; background: linear-gradient(90deg, #00d4aa, #00bfa0); border-radius: 4px; transition: width 1s ease; }
        .pn-desc { font-size: 12px; color: #444; }

        @media (max-width: 600px) {
            .missao-card { flex-direction: column; }
            .hero-stats { grid-template-columns: repeat(2,1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Study<span>AI</span></div>
    <div class="header-right">
        <a href="/" class="back-link">← Início</a>
        <a href="/" class="btn-estudar">Estudar agora →</a>
    </div>
</div>

<div class="container" id="container">
    <div class="loading-state" id="loading">
        <div class="spinner"></div>
        <p style="color:#555;font-size:14px">Carregando seu centro de comando...</p>
    </div>
</div>

<script>
const PERFIL_KEY  = 'studyai_perfil';
const STREAK_KEY  = 'studyai_streak';

// ── DADOS ─────────────────────────────────────────────────────────────────
function getPerfil() {
    try { return JSON.parse(localStorage.getItem(PERFIL_KEY)) || { temas: {} }; }
    catch { return { temas: {} }; }
}

function getStreak() {
    try {
        const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{}');
        return { streak: s.streak || 0, ultima: s.ultima || null };
    } catch { return { streak: 0, ultima: null }; }
}

function calcularDiasSemEstudo(ultima) {
    if (!ultima) return 99;
    const diff = new Date() - new Date(ultima);
    return Math.floor(diff / 86400000);
}

function domClass(d) { return d >= 70 ? 'dom-high' : d >= 45 ? 'dom-mid' : 'dom-low'; }
function barClass(d) { return d >= 70 ? 'barra-high' : d >= 45 ? 'barra-mid' : 'barra-low'; }

function diasParaData(dataStr) {
    if (!dataStr) return 999;
    const diff = new Date(dataStr) - new Date(new Date().toDateString());
    return Math.round(diff / 86400000);
}

function labelRevisao(dias) {
    if (dias <= 0) return { texto: 'Revisar hoje', cls: 'rev-hoje' };
    if (dias === 1) return { texto: 'Amanhã', cls: 'rev-amanha' };
    if (dias <= 7) return { texto: `Em ${dias} dias`, cls: 'rev-semana' };
    return { texto: `${dias} dias`, cls: 'rev-futura' };
}

// ── SPARKLINE SVG ─────────────────────────────────────────────────────────
function sparkline(historico) {
    if (!historico || historico.length < 2) return '';
    const vals = historico.slice(-7).map(h => h.dominio || 0);
    const W = 60, H = 28;
    const min = Math.min(...vals), max = Math.max(...vals, min + 1);
    const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = H - ((v - min) / (max - min)) * (H - 4) - 2;
        return `${x},${y}`;
    }).join(' ');
    const last = vals[vals.length - 1];
    const col = last >= 70 ? '#00d4aa' : last >= 45 ? '#f59e0b' : '#f87171';
    return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
        <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
}

// ── EVOLUÇÃO SEMANAL ──────────────────────────────────────────────────────
function evoluçãoSemanal(perfil) {
    const dias = [];
    const hoje = new Date();
    for (let i = 6; i >= 0; i--) {
        const d = new Date(hoje); d.setDate(d.getDate() - i);
        const str = d.toISOString().slice(0,10);
        const label = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
        const isHoje = i === 0;

        // Verifica se houve sessão nesse dia
        let sessoes = 0;
        let dominioMedio = 0;
        let count = 0;
        for (const t of Object.values(perfil.temas || {})) {
            for (const h of (t.historico || [])) {
                if (h.data === str) {
                    sessoes++;
                    dominioMedio += h.dominio || 0;
                    count++;
                }
            }
        }
        if (count) dominioMedio = Math.round(dominioMedio / count);

        dias.push({ str, label, isHoje, sessoes, dominioMedio });
    }
    return dias;
}

// ── TIMELINE ──────────────────────────────────────────────────────────────
function buildTimeline(perfil) {
    const eventos = [];
    for (const [nome, t] of Object.entries(perfil.temas || {})) {
        for (const h of (t.historico || [])) {
            eventos.push({ data: h.data, tema: nome, dominio: h.dominio });
        }
    }
    return eventos.sort((a, b) => b.data.localeCompare(a.data)).slice(0, 8);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderizar(analise, perfil, streakData) {
    const container = document.getElementById('container');
    const hoje = new Date().toISOString().slice(0, 10);
    const { streak, ultima } = streakData;
    const diasSem = calcularDiasSemEstudo(ultima);
    const temas = perfil.temas || {};
    const temTemas = Object.keys(temas).length > 0;

    if (!temTemas) {
        container.innerHTML = `
        <div class="empty-state">
            <div style="font-size:52px;margin-bottom:16px">📊</div>
            <h2>Seu centro de comando está vazio</h2>
            <p>Analise um material de estudo e avalie pelo menos um vídeo<br>para ativar seu dashboard personalizado.</p>
            <a href="/" class="btn-comecar">Começar a estudar →</a>
        </div>`;
        return;
    }

    // Stats gerais
    const temasList = Object.entries(temas);
    const totalSessoes = temasList.reduce((a, [,t]) => a + (t.sessoes || 0), 0);
    const dominados = temasList.filter(([,t]) => t.concluido).length;
    const medioGeral = temasList.length
        ? Math.round(temasList.reduce((a,[,t]) => a + (t.dominio||0), 0) / temasList.length)
        : 0;

    // Revisões pendentes
    const revisoes = temasList
        .filter(([,t]) => t.proxima_revisao && !t.concluido)
        .map(([nome, t]) => ({ nome, dominio: t.dominio||0, data: t.proxima_revisao, dias: diasParaData(t.proxima_revisao) }))
        .sort((a,b) => a.dias - b.dias);

    // Erros recorrentes
    const erros = temasList
        .filter(([,t]) => (t.padroes_erro||[]).length)
        .flatMap(([nome, t]) => t.padroes_erro.slice(0,2).map(e => ({ tema: nome, erro: e })));

    // Próximo nível: tema com maior potencial de evolução
    const temaBaixo = temasList
        .filter(([,t]) => !t.concluido && (t.sessoes||0) >= 1)
        .sort(([,a],[,b]) => (a.dominio||0) - (b.dominio||0))[0];
    const temaBaixoNome = temaBaixo?.[0] || '';
    const temaBaixoDom  = temaBaixo?.[1]?.dominio || 0;
    const faltaParaDominar = Math.max(0, 70 - temaBaixoDom);
    const pctProximo = temaBaixoDom < 70 ? Math.round((temaBaixoDom / 70) * 100) : 100;

    // Missão do dia
    const missao = analise.proxima_missao || {};

    // Evolução semanal
    const semana = evoluçãoSemanal(perfil);
    const maxSessoes = Math.max(...semana.map(d => d.sessoes), 1);

    // Timeline
    const timeline = buildTimeline(perfil);

    // Alerta de inatividade
    const temAlerta = diasSem >= 3;

    container.innerHTML = `
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
            <h1 style="font-size:22px;font-weight:900;margin-bottom:4px;">📊 Centro de Comando</h1>
            <p style="color:#555;font-size:13px;">Seu progresso personalizado de aprendizado</p>
        </div>
        <div style="font-size:12px;color:#333;">${hoje}</div>
    </div>

    ${temAlerta ? `
    <div class="alerta show">
        <div class="alerta-icon">⚠️</div>
        <div class="alerta-texto">${analise.alerta || `Você ficou ${diasSem} dias sem estudar. Que tal uma sessão rápida hoje? Sua missão do dia está pronta.`}</div>
    </div>` : ''}

    <!-- HERO STATS -->
    <div class="hero-stats">
        <div class="stat-card destaque">
            <div class="stat-icon">🔥</div>
            <div class="stat-num streak-num">${streak}</div>
            <div class="stat-label">${streak === 1 ? 'dia' : 'dias'} seguidos</div>
            <div class="stat-sub">${diasSem === 0 ? '✓ Estudou hoje' : diasSem === 1 ? 'Estude hoje p/ não perder' : `${diasSem} dias sem estudar`}</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-num teal">${medioGeral}%</div>
            <div class="stat-label">domínio médio</div>
            <div class="stat-sub">${Object.keys(temas).length} temas</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-num" style="color:#4ade80">${dominados}</div>
            <div class="stat-label">temas dominados</div>
            <div class="stat-sub">${Object.keys(temas).length - dominados} em progresso</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎯</div>
            <div class="stat-num" style="color:#e8e8e8">${totalSessoes}</div>
            <div class="stat-label">sessões de estudo</div>
            <div class="stat-sub">histórico total</div>
        </div>
    </div>

    <!-- MISSÃO DO DIA -->
    ${missao.tema ? `
    <div class="missao-card">
        <div class="missao-icon">🎯</div>
        <div class="missao-body">
            <div class="missao-label">Missão de hoje</div>
            <div class="missao-titulo">${missao.tema}</div>
            <div class="missao-desc">${missao.acao}</div>
            <div class="missao-meta">
                ${missao.tempo_estimado ? `<span class="missao-tag">⏱ ${missao.tempo_estimado}</span>` : ''}
                ${missao.motivo ? `<span class="missao-tag" style="background:#1a1a1a;color:#555;border-color:#222">${missao.motivo}</span>` : ''}
            </div>
        </div>
        <a href="/" class="btn-missao">Ir estudar →</a>
    </div>` : `
    <div class="missao-card">
        <div class="missao-icon">🎯</div>
        <div class="missao-body">
            <div class="missao-label">Missão de hoje</div>
            <div class="missao-titulo">${temaBaixoNome || 'Continue estudando'}</div>
            <div class="missao-desc">
                ${temaBaixoNome ? `Foque em <strong>${temaBaixoNome}</strong> — domínio atual ${temaBaixoDom}%. ${faltaParaDominar > 0 ? `Faltam ${faltaParaDominar}% para dominar.` : 'Quase lá!'}` : 'Analise um novo material para receber sua missão personalizada.'}
            </div>
        </div>
        <a href="/" class="btn-missao">Ir estudar →</a>
    </div>`}

    ${analise.mensagem ? `<div class="motivacao-box">"${analise.mensagem}"</div>` : ''}

    <!-- PRÓXIMO NÍVEL -->
    ${temaBaixoNome && temaBaixoDom < 70 ? `
    <div class="proximo-nivel">
        <div class="pn-header">
            <span class="pn-titulo">📍 Próximo objetivo — dominar ${temaBaixoNome}</span>
            <span class="pn-pct">${pctProximo}%</span>
        </div>
        <div class="pn-barra-bg">
            <div class="pn-barra-fill" style="width:${pctProximo}%"></div>
        </div>
        <div class="pn-desc">Domínio atual: ${temaBaixoDom}% · Meta: 70% para considerar dominado</div>
    </div>` : ''}

    <!-- EVOLUÇÃO SEMANAL -->
    <div class="section">
        <div class="section-title">📅 Atividade — últimos 7 dias</div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:20px 20px 14px;">
            <div class="evolucao-grid">
                ${semana.map(d => `
                <div class="evolucao-dia ${d.isHoje ? 'evolucao-hoje' : ''}">
                    <div class="evolucao-barra-bg">
                        <div class="evolucao-barra-fill ${d.sessoes === 0 ? 'vazio' : ''}"
                             style="height:${d.sessoes ? Math.max(12, Math.round((d.sessoes/maxSessoes)*100)) : 0}%"></div>
                    </div>
                    <div class="evolucao-label">${d.label}</div>
                </div>`).join('')}
            </div>
        </div>
    </div>

    <!-- DOMÍNIO POR TEMA -->
    <div class="section">
        <div class="section-title">🧠 Domínio por tema</div>
        <div class="temas-lista">
            ${temasList.sort(([,a],[,b]) => (b.dominio||0) - (a.dominio||0)).map(([nome, t]) => {
                const d = t.dominio || 0;
                const revisaoUrgente = t.proxima_revisao && diasParaData(t.proxima_revisao) <= 0 && !t.concluido;
                const iconStatus = t.concluido ? '✅' : revisaoUrgente ? '⚠️' : d < 40 ? '🔴' : '📚';
                const rowClass = t.concluido ? 'concluido' : revisaoUrgente ? 'revisao-urgente' : d < 40 ? 'baixo-dominio' : '';
                const velBadge = t.velocidade === 'rápida' ? '<span class="tema-vel vel-rapida">⚡ Rápido</span>'
                              : t.velocidade === 'lenta' ? '<span class="tema-vel vel-lenta">📚 Lento</span>' : '';
                const rev = t.proxima_revisao ? labelRevisao(diasParaData(t.proxima_revisao)) : null;
                return `
                <div class="tema-row ${rowClass}">
                    <span class="tema-status-icon">${iconStatus}</span>
                    <div class="tema-info">
                        <div class="tema-nome-row">
                            <span class="tema-nome">${nome}</span>${velBadge}
                        </div>
                        <div class="tema-barra-bg">
                            <div class="tema-barra-fill ${barClass(d)}" style="width:${d}%"></div>
                        </div>
                        <div class="tema-footer">
                            <span>${t.sessoes||0} ${(t.sessoes||0)===1?'sessão':'sessões'}</span>
                            ${rev && !t.concluido ? `<span class="revisao-badge">${rev.texto}</span>` : ''}
                            ${t.concluido ? '<span class="concluido-badge">✓ Dominado</span>' : ''}
                            ${(t.padroes_erro||[]).length ? `<span>⚠️ ${t.padroes_erro.length} erro${t.padroes_erro.length>1?'s':''} recorrente${t.padroes_erro.length>1?'s':''}</span>` : ''}
                        </div>
                    </div>
                    <div class="sparkline">${sparkline(t.historico)}</div>
                    <div class="tema-dominio-num ${domClass(d)}">${d}%</div>
                </div>`;
            }).join('')}
        </div>
    </div>

    <!-- DOIS LADOS: revisões + erros -->
    <div class="two-col">
        ${revisoes.length ? `
        <div class="section">
            <div class="section-title">📅 Revisões agendadas</div>
            <div class="revisoes-lista">
                ${revisoes.slice(0,6).map(r => {
                    const lbl = labelRevisao(r.dias);
                    return `<div class="revisao-row">
                        <span class="rev-urgencia ${lbl.cls}">${lbl.texto}</span>
                        <span class="rev-nome">${r.nome}</span>
                        <span class="rev-dominio ${domClass(r.dominio)}">${r.dominio}%</span>
                    </div>`;
                }).join('')}
            </div>
        </div>` : '<div></div>'}

        ${erros.length ? `
        <div class="section">
            <div class="section-title">⚠️ Erros recorrentes</div>
            <div class="erros-lista">
                ${erros.slice(0,5).map(e => `
                <div class="erro-item">
                    <div>
                        <div class="erro-tema">${e.tema}</div>
                        <div class="erro-texto">${e.erro}</div>
                    </div>
                </div>`).join('')}
            </div>
        </div>` : '<div></div>'}
    </div>

    <!-- HISTÓRICO -->
    ${timeline.length ? `
    <div class="section">
        <div class="section-title">🕐 Histórico recente</div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:4px 18px;">
            <div class="timeline">
                ${timeline.map(e => `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-data">${e.data}</div>
                    <div class="timeline-texto flex-1">${e.tema}</div>
                    <div class="timeline-dominio">${e.dominio}%</div>
                </div>`).join('')}
            </div>
        </div>
    </div>` : ''}
    `;
}

// ── INICIALIZAR ────────────────────────────────────────────────────────────
async function inicializar() {
    const perfil = getPerfil();
    const streakData = getStreak();
    const diasSem = calcularDiasSemEstudo(streakData.ultima);
    const temTemas = Object.keys(perfil.temas || {}).length > 0;

    if (!temTemas) {
        renderizar({}, perfil, streakData);
        return;
    }

    try {
        const res = await fetch('/progresso-analise', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ perfil, streak: streakData.streak, dias_sem_estudo: diasSem })
        });
        const analise = await res.json();
        renderizar(analise, perfil, streakData);
    } catch {
        renderizar({
            proxima_missao: {}, revisoes_agendadas: [],
            principais_dificuldades: [], ranking_dominio: [],
            mensagem: 'Continue estudando — cada sessão conta.', alerta: null
        }, perfil, streakData);
    }
}

inicializar();
</script>
</body>
</html>
