<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Progresso — StudyAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #e8e8e8;
            min-height: 100vh;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: #00d4aa; }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: #555; text-decoration: none; font-size: 13px; font-weight: 600;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #00d4aa; }

        .container { max-width: 820px; margin: 0 auto; padding: 28px 20px 60px; }

        /* LOADING */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1e1e1e;
            border-top-color: #00d4aa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { color: #555; font-size: 14px; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state h2 { font-size: 20px; color: #e8e8e8; margin-bottom: 8px; }
        .empty-state p { color: #555; font-size: 14px; margin-bottom: 24px; }
        .btn-start {
            display: inline-block;
            background: #00d4aa; color: #0d0d0d;
            padding: 12px 28px; border-radius: 12px;
            text-decoration: none; font-size: 14px; font-weight: 700;
        }

        /* TOPO: STREAK + MISSÃO */
        .top-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            margin-bottom: 24px;
            align-items: stretch;
        }
        @media (max-width: 600px) { .top-grid { grid-template-columns: 1fr; } }

        .streak-card {
            background: #161616;
            border: 1px solid #1e1e1e;
            border-radius: 18px;
            padding: 24px 28px;
            text-align: center;
            min-width: 130px;
        }
        .streak-fire { font-size: 36px; margin-bottom: 6px; }
        .streak-num {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            color: #f59e0b;
        }
        .streak-label { font-size: 12px; color: #555; margin-top: 4px; font-weight: 600; }

        .missao-card {
            background: linear-gradient(135deg, #0a1f1a, #0d2820);
            border: 1px solid #00d4aa33;
            border-radius: 18px;
            padding: 24px;
        }
        .missao-tag {
            font-size: 10px;
            font-weight: 700;
            color: #00d4aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .missao-tema { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
        .missao-acao { font-size: 14px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
        .missao-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .missao-tempo {
            font-size: 12px; font-weight: 600; color: #00d4aa;
            background: #0a1f1a; padding: 4px 12px; border-radius: 8px;
        }
        .missao-motivo { font-size: 12px; color: #444; font-style: italic; }

        /* ALERTA */
        .alerta-box {
            background: #1f1a0a;
            border: 1px solid #f59e0b44;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 13px;
            color: #f59e0b;
            margin-bottom: 20px;
            display: none;
        }
        .alerta-box.show { display: block; }

        /* SEÇÃO GENÉRICA */
        .section { margin-bottom: 28px; }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }

        /* RANKING DOMÍNIO */
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .ranking-item {
            background: #161616;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .ranking-pos {
            width: 28px; height: 28px; min-width: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800;
        }
        .pos-1 { background: #f59e0b22; color: #f59e0b; }
        .pos-2 { background: #aaa2; color: #aaa; }
        .pos-3 { background: #b9640022; color: #b96400; }
        .pos-n { background: #1e1e1e; color: #555; }

        .ranking-info { flex: 1; min-width: 0; }
        .ranking-tema { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .ranking-bar-bg { height: 5px; background: #1e1e1e; border-radius: 3px; overflow: hidden; }
        .ranking-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .bar-high   { background: #00d4aa; }
        .bar-mid    { background: #f59e0b; }
        .bar-low    { background: #f87171; }

        .ranking-dominio-num {
            font-size: 18px;
            font-weight: 800;
            min-width: 48px;
            text-align: right;
        }
        .dom-high { color: #00d4aa; }
        .dom-mid  { color: #f59e0b; }
        .dom-low  { color: #f87171; }

        /* REVISÕES */
        .revisoes-list { display: flex; flex-direction: column; gap: 10px; }
        .revisao-card {
            background: #161616;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .revisao-urgencia {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }
        .urg-hoje         { background: #2e1a1a; color: #f87171; }
        .urg-esta-semana  { background: #1f1a0a; color: #f59e0b; }
        .urg-prox-semana  { background: #1a1a1a; color: #555; }

        .revisao-info { flex: 1; }
        .revisao-tema { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .revisao-motivo { font-size: 12px; color: #444; }

        .revisao-dominio {
            font-size: 15px;
            font-weight: 800;
        }

        /* DIFICULDADES */
        .dificuldades-list { display: flex; flex-direction: column; gap: 8px; }
        .dificuldade-item {
            background: #161616;
            border: 1px solid #1e1e1e;
            border-left: 3px solid #f87171;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        /* CHECKLIST */
        .checklist { display: flex; flex-direction: column; gap: 8px; }
        .check-item {
            display: flex; align-items: center; gap: 10px;
            background: #161616; border: 1px solid #1e1e1e;
            border-radius: 10px; padding: 12px 16px;
            font-size: 13px; color: #ccc;
        }
        .check-icon { font-size: 16px; }

        /* MENSAGEM */
        .mensagem-box {
            background: #161616;
            border: 1px solid #1e1e1e;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            font-size: 15px;
            color: #aaa;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 24px;
        }
        .mensagem-box strong { color: #00d4aa; font-style: normal; }

        /* DOIS GRID */
        .two-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        @media (max-width: 600px) { .two-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Study<span>AI</span></div>
    <a href="/" class="back-btn">← Voltar</a>
</div>

<div class="container" id="main-container">
    <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Analisando seu progresso...</p>
    </div>
</div>

<script>
const PERFIL_KEY = 'studyai_perfil';
const STREAK_KEY = 'studyai_streak';

// ── STREAK ──
function calcularStreak() {
    const hoje = new Date().toDateString();
    const dados = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"streak":0,"ultima":""}');

    if (dados.ultima === hoje) {
        return dados.streak; // mesmo dia, não muda
    }

    const ontem = new Date();
    ontem.setDate(ontem.getDate() - 1);
    const ontemStr = ontem.toDateString();

    let novoStreak;
    if (dados.ultima === ontemStr) {
        novoStreak = (dados.streak || 0) + 1; // dia consecutivo
    } else if (!dados.ultima) {
        novoStreak = 1; // primeira vez
    } else {
        novoStreak = 1; // quebrou streak
    }

    localStorage.setItem(STREAK_KEY, JSON.stringify({ streak: novoStreak, ultima: hoje }));
    return novoStreak;
}

function calcularDiasSemEstudo() {
    const dados = JSON.parse(localStorage.getItem(STREAK_KEY) || '{}');
    if (!dados.ultima) return 0;
    const ultima = new Date(dados.ultima);
    const hoje = new Date();
    return Math.floor((hoje - ultima) / (1000 * 60 * 60 * 24));
}

function getPerfil() {
    try { return JSON.parse(localStorage.getItem(PERFIL_KEY)) || { temas: {} }; }
    catch { return { temas: {} }; }
}

// ── RENDER ──
function urgenciaClass(u) {
    if (u === 'hoje') return 'urg-hoje';
    if (u === 'esta semana') return 'urg-esta-semana';
    return 'urg-prox-semana';
}
function domClass(d) { return d >= 70 ? 'dom-high' : d >= 50 ? 'dom-mid' : 'dom-low'; }
function barClass(d) { return d >= 70 ? 'bar-high' : d >= 50 ? 'bar-mid' : 'bar-low'; }
function posClass(i) { return ['pos-1','pos-2','pos-3'][i] || 'pos-n'; }

function renderizar(analise, perfil, streak) {
    const container = document.getElementById('main-container');

    const temaTemas = Object.keys(perfil.temas || {}).length > 0;

    const alertaHTML = analise.alerta && analise.alerta !== 'null'
        ? `<div class="alerta-box show">⚠️ ${analise.alerta}</div>`
        : '';

    const missao = analise.proxima_missao || {};
    const missaoHTML = missao.tema ? `
    <div class="top-grid">
        <div class="streak-card">
            <div class="streak-fire">🔥</div>
            <div class="streak-num">${streak}</div>
            <div class="streak-label">${streak === 1 ? 'dia' : 'dias'} seguidos</div>
        </div>
        <div class="missao-card">
            <div class="missao-tag">🎯 Missão do dia</div>
            <div class="missao-tema">${missao.tema}</div>
            <div class="missao-acao">${missao.acao}</div>
            <div class="missao-meta">
                ${missao.tempo_estimado ? `<span class="missao-tempo">⏱ ${missao.tempo_estimado}</span>` : ''}
                ${missao.motivo ? `<span class="missao-motivo">${missao.motivo}</span>` : ''}
            </div>
        </div>
    </div>` : `
    <div class="top-grid">
        <div class="streak-card">
            <div class="streak-fire">🔥</div>
            <div class="streak-num">${streak}</div>
            <div class="streak-label">${streak === 1 ? 'dia' : 'dias'} seguidos</div>
        </div>
        <div class="missao-card" style="display:flex;align-items:center;justify-content:center;">
            <div style="text-align:center;color:#444;font-size:14px;">Avalie alguns vídeos para receber sua missão personalizada</div>
        </div>
    </div>`;

    const mensagemHTML = analise.mensagem ? `
    <div class="mensagem-box">"${analise.mensagem}"</div>` : '';

    // Ranking
    const ranking = analise.ranking_dominio || Object.entries(perfil.temas || {})
        .map(([nome, d]) => ({ tema: nome, dominio: d.dominio || 0 }))
        .sort((a, b) => b.dominio - a.dominio);

    const rankingHTML = ranking.length ? `
    <div class="section">
        <div class="section-title">🏆 Ranking de domínio</div>
        <div class="ranking-list">
            ${ranking.map((r, i) => `
            <div class="ranking-item">
                <div class="ranking-pos ${posClass(i)}">${i + 1}</div>
                <div class="ranking-info">
                    <div class="ranking-tema">${r.tema}</div>
                    <div class="ranking-bar-bg">
                        <div class="ranking-bar-fill ${barClass(r.dominio)}" style="width:${r.dominio}%"></div>
                    </div>
                </div>
                <div class="ranking-dominio-num ${domClass(r.dominio)}">${r.dominio}%</div>
            </div>`).join('')}
        </div>
    </div>` : '';

    // Revisões
    const revisoes = analise.revisoes_agendadas || [];
    const revisoesHTML = revisoes.length ? `
    <div class="section">
        <div class="section-title">📅 Revisões agendadas</div>
        <div class="revisoes-list">
            ${revisoes.map(r => `
            <div class="revisao-card">
                <span class="revisao-urgencia ${urgenciaClass(r.urgencia)}">${r.urgencia}</span>
                <div class="revisao-info">
                    <div class="revisao-tema">${r.tema}</div>
                    <div class="revisao-motivo">${r.motivo}</div>
                </div>
                <div class="revisao-dominio ${domClass(r.dominio)}">${r.dominio}%</div>
            </div>`).join('')}
        </div>
    </div>` : '';

    // Dificuldades
    const difs = analise.principais_dificuldades || [];
    const difsHTML = difs.length ? `
    <div class="section">
        <div class="section-title">⚠️ Principais dificuldades</div>
        <div class="dificuldades-list">
            ${difs.map(d => `<div class="dificuldade-item">${d}</div>`).join('')}
        </div>
    </div>` : '';

    // Checklist (sessões completadas)
    const checkItems = Object.entries(perfil.temas || {})
        .filter(([, d]) => (d.sessoes || 0) > 0)
        .map(([nome, d]) => ({ nome, sessoes: d.sessoes, dominio: d.dominio || 0 }));

    const checklistHTML = checkItems.length ? `
    <div class="section">
        <div class="section-title">✅ Conteúdos estudados</div>
        <div class="checklist">
            ${checkItems.map(c => `
            <div class="check-item">
                <span class="check-icon">${c.dominio >= 70 ? '✅' : '📚'}</span>
                <span style="flex:1">${c.nome}</span>
                <span style="font-size:12px;color:#444">${c.sessoes} ${c.sessoes === 1 ? 'sessão' : 'sessões'}</span>
            </div>`).join('')}
        </div>
    </div>` : '';

    container.innerHTML = `
        <div style="margin-bottom:24px">
            <h1 style="font-size:22px;font-weight:800;margin-bottom:4px">📊 Meu Progresso</h1>
            <p style="color:#555;font-size:14px">Histórico de estudos e recomendações personalizadas</p>
        </div>
        ${alertaHTML}
        ${missaoHTML}
        ${mensagemHTML}
        <div class="two-grid">
            ${rankingHTML ? `<div>${rankingHTML}</div>` : ''}
            ${checklistHTML ? `<div>${checklistHTML}</div>` : ''}
        </div>
        ${revisoesHTML}
        ${difsHTML}
    `;
}

// ── INICIALIZAR ──
async function inicializar() {
    const perfil = getPerfil();
    const streak = calcularStreak();
    const diasSemEstudo = calcularDiasSemEstudo();
    const temTemas = Object.keys(perfil.temas || {}).length > 0;

    if (!temTemas) {
        document.getElementById('main-container').innerHTML = `
        <div class="empty-state">
            <div style="font-size:48px;margin-bottom:16px">📚</div>
            <h2>Nenhum progresso ainda</h2>
            <p>Estude alguns temas e avalie os vídeos para ver seu progresso aqui.</p>
            <a href="/" class="btn-start">Começar a estudar</a>
        </div>`;
        return;
    }

    try {
        const res = await fetch('/progresso-analise', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ perfil, streak, dias_sem_estudo: diasSemEstudo })
        });
        const analise = await res.json();
        renderizar(analise, perfil, streak);
    } catch (e) {
        // Renderiza só com dados locais se API falhar
        renderizar({
            proxima_missao: {},
            revisoes_agendadas: [],
            principais_dificuldades: [],
            ranking_dominio: [],
            mensagem: 'Continue estudando!',
            alerta: null
        }, perfil, streak);
    }
}

inicializar();
</script>
</body>
</html>
