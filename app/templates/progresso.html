<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — StudyAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d; color: #e8e8e8; min-height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 16px 24px; border-bottom: 1px solid #1e1e1e;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: #0d0d0d; z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: #00d4aa; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn-estudar {
            background: #00d4aa; color: #0d0d0d;
            padding: 8px 18px; border-radius: 10px;
            text-decoration: none; font-size: 13px; font-weight: 800;
        }
        .back-link { color: #444; text-decoration: none; font-size: 13px; font-weight: 600; }
        .back-link:hover { color: #00d4aa; }

        .container { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }

        /* LOADING */
        .loading-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 100px 20px; gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #1e1e1e;
            border-top-color: #00d4aa; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY */
        .empty-state { text-align: center; padding: 100px 20px; }
        .empty-state h2 { font-size: 22px; margin-bottom: 8px; }
        .empty-state p { color: #555; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
        .btn-comecar {
            display: inline-block; background: #00d4aa; color: #0d0d0d;
            padding: 14px 32px; border-radius: 12px;
            text-decoration: none; font-size: 15px; font-weight: 800;
        }

        /* ── SEÇÕES ── */
        .section { margin-bottom: 24px; }
        .section-title {
            font-size: 11px; font-weight: 800; color: #333;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
        }

        /* HERO STATS */
        .hero-stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) { .hero-stats { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: #111; border: 1px solid #1e1e1e; border-radius: 16px;
            padding: 20px 18px;
        }
        .stat-card.destaque { border-color: #00d4aa33; background: linear-gradient(135deg, #0a1a16, #111); }
        .stat-icon { font-size: 22px; margin-bottom: 10px; }
        .stat-num { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-num.streak-num { color: #f59e0b; }
        .stat-num.teal { color: #00d4aa; }
        .stat-label { font-size: 11px; color: #444; font-weight: 600; }
        .stat-sub { font-size: 11px; color: #333; margin-top: 4px; }

        /* MISSÃO DO DIA */
        .missao-card {
            background: linear-gradient(135deg, #0a1f1a 0%, #111 100%);
            border: 1px solid #00d4aa44; border-radius: 18px; padding: 24px 26px;
            margin-bottom: 24px; display: flex; align-items: flex-start; gap: 18px;
        }
        .missao-icon { font-size: 36px; flex-shrink: 0; }
        .missao-body { flex: 1; }
        .missao-label { font-size: 10px; font-weight: 800; color: #00d4aa; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
        .missao-titulo { font-size: 20px; font-weight: 900; color: #f0f0f0; margin-bottom: 6px; line-height: 1.3; }
        .missao-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 14px; }
        .missao-meta { display: flex; gap: 10px; flex-wrap: wrap; }
        .missao-tag {
            font-size: 11px; font-weight: 700; padding: 4px 12px;
            border-radius: 8px; background: #0a1f1a; color: #00d4aa;
            border: 1px solid #00d4aa22;
        }
        .btn-missao {
            background: #00d4aa; color: #0d0d0d; border: none;
            padding: 12px 22px; border-radius: 12px; font-size: 14px;
            font-weight: 800; cursor: pointer; text-decoration: none;
            display: inline-block; flex-shrink: 0; align-self: center;
            transition: background 0.2s;
        }
        .btn-missao:hover { background: #00bfa0; }

        /* ALERTA */
        .alerta { display: none; }
        .alerta.show {
            display: flex; align-items: flex-start; gap: 12px;
            background: #1f180a; border: 1px solid #f59e0b33;
            border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
        }
        .alerta-icon { font-size: 20px; flex-shrink: 0; }
        .alerta-texto { font-size: 13px; color: #f59e0b; line-height: 1.5; }

        /* DOMÍNIO POR TEMA */
        .temas-lista { display: flex; flex-direction: column; gap: 10px; }
        .tema-row {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 16px 18px; display: flex; align-items: center; gap: 14px;
            transition: border-color 0.2s;
        }
        .tema-row:hover { border-color: #2a2a2a; }
        .tema-row.concluido { border-color: #00d4aa22; }
        .tema-row.revisao-urgente { border-color: #f59e0b33; }
        .tema-row.baixo-dominio { border-left: 3px solid #f87171; }

        .tema-status-icon { font-size: 18px; flex-shrink: 0; }
        .tema-info { flex: 1; min-width: 0; }
        .tema-nome-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .tema-nome { font-size: 14px; font-weight: 700; color: #e8e8e8; }
        .tema-vel {
            font-size: 10px; font-weight: 700; padding: 2px 8px;
            border-radius: 6px;
        }
        .vel-rapida { background: #0a1f1a; color: #00d4aa; }
        .vel-lenta { background: #1f1a0a; color: #f59e0b; }

        .tema-barra-bg { height: 6px; background: #1e1e1e; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .tema-barra-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .barra-high { background: linear-gradient(90deg, #00d4aa, #00bfa0); }
        .barra-mid  { background: linear-gradient(90deg, #f59e0b, #e08e00); }
        .barra-low  { background: linear-gradient(90deg, #f87171, #e05555); }

        .tema-footer { display: flex; align-items: center; gap: 12px; font-size: 11px; color: #444; flex-wrap: wrap; }
        .tema-footer .revisao-badge { color: #f59e0b; font-weight: 600; }
        .tema-footer .concluido-badge { color: #00d4aa; font-weight: 600; }

        /* SPARKLINE por tema */
        .sparkline { flex-shrink: 0; }
        svg.spark { display: block; }

        .tema-dominio-num {
            font-size: 20px; font-weight: 900; flex-shrink: 0; min-width: 52px; text-align: right;
        }
        .dom-high { color: #00d4aa; }
        .dom-mid  { color: #f59e0b; }
        .dom-low  { color: #f87171; }

        /* REVISÕES */
        .revisoes-lista { display: flex; flex-direction: column; gap: 8px; }
        .revisao-row {
            background: #111; border: 1px solid #1e1e1e; border-radius: 12px;
            padding: 14px 18px; display: flex; align-items: center; gap: 14px;
        }
        .rev-urgencia {
            font-size: 11px; font-weight: 800; padding: 4px 12px;
            border-radius: 8px; white-space: nowrap;
        }
        .rev-hoje       { background: #2e1a1a; color: #f87171; }
        .rev-amanha     { background: #1f1a0a; color: #f59e0b; }
        .rev-semana     { background: #1a1a2e; color: #7aa2f7; }
        .rev-futura     { background: #1a1a1a; color: #444; }
        .rev-nome { font-size: 13px; font-weight: 600; flex: 1; }
        .rev-dominio { font-size: 13px; font-weight: 800; }

        /* ERROS RECORRENTES */
        .erros-lista { display: flex; flex-direction: column; gap: 8px; }
        .erro-item {
            background: #111; border: 1px solid #1e1e1e;
            border-left: 3px solid #f8717155; border-radius: 10px;
            padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px;
        }
        .erro-tema { font-size: 11px; font-weight: 700; color: #f87171; margin-bottom: 3px; }
        .erro-texto { font-size: 12px; color: #666; line-height: 1.4; }

        /* EVOLUÇÃO SEMANAL */
        .evolucao-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .evolucao-dia {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .evolucao-barra-bg {
            width: 28px; background: #1e1e1e; border-radius: 4px; overflow: hidden;
            height: 80px; display: flex; align-items: flex-end;
        }
        .evolucao-barra-fill {
            width: 100%; border-radius: 4px 4px 0 0;
            background: linear-gradient(to top, #00d4aa, #00d4aa88);
            transition: height 0.8s ease;
        }
        .evolucao-barra-fill.vazio { background: #222; }
        .evolucao-label { font-size: 10px; color: #444; font-weight: 600; }
        .evolucao-hoje .evolucao-label { color: #00d4aa; }
        .evolucao-hoje .evolucao-barra-bg { border: 1px solid #00d4aa33; }

        /* TIMELINE */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .timeline-item {
            display: flex; gap: 14px; padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-dot {
            width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
            background: #00d4aa; margin-top: 5px;
        }
        .timeline-data { font-size: 11px; color: #444; min-width: 70px; margin-top: 2px; }
        .timeline-texto { font-size: 13px; color: #ccc; line-height: 1.4; }
        .timeline-dominio { font-size: 11px; color: #00d4aa; font-weight: 700; }

        /* DOIS LADOS */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

        /* MOTIVAÇÃO */
        .motivacao-box {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 20px 22px; text-align: center; font-size: 15px;
            color: #888; line-height: 1.7; font-style: italic; margin-bottom: 24px;
        }
        .motivacao-box em { color: #00d4aa; font-style: normal; font-weight: 700; }

        /* PRÓXIMO NÍVEL */
        .proximo-nivel {
            background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
            padding: 16px 20px; margin-bottom: 24px;
        }
        .pn-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .pn-titulo { font-size: 12px; font-weight: 700; color: #555; }
        .pn-pct { font-size: 13px; font-weight: 800; color: #00d4aa; }
        .pn-barra-bg { height: 8px; background: #1e1e1e; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .pn-barra-fill { height: 100%; background: linear-gradient(90deg, #00d4aa, #00bfa0); border-radius: 4px; transition: width 1s ease; }
        .pn-desc { font-size: 12px; color: #444; }

        @media (max-width: 600px) {
            .missao-card { flex-direction: column; }
            .hero-stats { grid-template-columns: repeat(2,1fr); }
        }

        /* ── XP / NÍVEL ──────────────────────────────────────────────────── */
        .xp-section {
            background: #0e0e0e; border: 1px solid #1e1e1e;
            border-radius: 18px; padding: 18px 22px;
            display: flex; align-items: center; gap: 18px;
            margin-bottom: 24px;
        }
        .xp-nivel-badge {
            width: 56px; height: 56px; border-radius: 14px;
            background: #0a1f1a; border: 1px solid #00d4aa33;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .xp-nivel-num { font-size: 22px; font-weight: 900; color: #00d4aa; line-height: 1; }
        .xp-nivel-txt { font-size: 9px; color: #00d4aa55; font-weight: 700; text-transform: uppercase; }
        .xp-info { flex: 1; min-width: 0; }
        .xp-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .xp-nome-nivel { font-size: 13px; font-weight: 700; color: #888; }
        .xp-pts { font-size: 14px; font-weight: 900; color: #00d4aa; }
        .xp-bar-bg { height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4aa, #00bfa0); border-radius: 4px; transition: width 1s ease; }
        .xp-sub { font-size: 11px; color: #333; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
        .xp-sub span { color: #444; }

        /* ── BADGES ──────────────────────────────────────────────────────── */
        .badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; }
        .badge-item {
            background: #111; border: 1px solid #1e1e1e;
            border-radius: 14px; padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
            transition: border-color 0.2s;
        }
        .badge-item.earned { border-color: #00d4aa22; background: #0a1a14; }
        .badge-item.locked { opacity: 0.3; filter: grayscale(0.8); }
        .badge-icon { font-size: 26px; flex-shrink: 0; }
        .badge-info { flex: 1; min-width: 0; }
        .badge-nome { font-size: 12px; font-weight: 700; color: #ddd; margin-bottom: 2px; }
        .badge-desc { font-size: 11px; color: #444; line-height: 1.3; }

        /* ── CALENDÁRIO ──────────────────────────────────────────────────── */
        .cal-wrap { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 20px 24px; }
        .cal-grid { display: flex; gap: 3px; flex-wrap: wrap; }
        .cal-day { width: 13px; height: 13px; border-radius: 2px; background: #1a1a1a; flex-shrink: 0; }
        .cal-day.l1 { background: #0a3326; }
        .cal-day.l2 { background: #0f6647; }
        .cal-day.l3 { background: #00d4aa88; }
        .cal-day.l4 { background: #00d4aa; }
        .cal-day.today { outline: 2px solid #00d4aa; outline-offset: 1px; border-radius: 3px; }
        .cal-legend { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 10px; color: #333; }
        .cal-leg-box { width: 11px; height: 11px; border-radius: 2px; }

        /* ── MISSÃO XP ───────────────────────────────────────────────────── */
        .missao-xp-prize {
            display: inline-flex; align-items: center; gap: 5px;
            background: #1a1a0a; border: 1px solid #f59e0b22;
            color: #f59e0b; font-size: 11px; font-weight: 800;
            padding: 4px 10px; border-radius: 8px;
        }
        .btn-missao-concluir {
            background: #f59e0b; color: #0d0d0d;
            border: none; padding: 12px 20px; border-radius: 12px;
            font-size: 13px; font-weight: 800; cursor: pointer;
            transition: background 0.2s; flex-shrink: 0; align-self: center;
        }
        .btn-missao-concluir:hover { background: #e08e00; }
        .missao-concluida-tag {
            display: inline-flex; align-items: center; gap: 5px;
            background: #0a1f1a; border: 1px solid #00d4aa33;
            color: #00d4aa; font-size: 11px; font-weight: 800;
            padding: 4px 12px; border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Study<span>AI</span></div>
    <div class="header-right">
        <a href="/" class="back-link">← Início</a>
        <a href="/" class="btn-estudar">Estudar agora →</a>
    </div>
</div>

<div class="container" id="container">
    <div class="loading-state" id="loading">
        <div class="spinner"></div>
        <p style="color:#555;font-size:14px">Carregando seu centro de comando...</p>
    </div>
</div>

<script>
const PERFIL_KEY  = 'studyai_perfil';
const STREAK_KEY  = 'studyai_streak';

// ── DADOS ─────────────────────────────────────────────────────────────────
function getPerfil() {
    try { return JSON.parse(localStorage.getItem(PERFIL_KEY)) || { temas: {} }; }
    catch { return { temas: {} }; }
}

function getStreak() {
    try {
        const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{}');
        return { streak: s.streak || 0, ultima: s.ultima || null };
    } catch { return { streak: 0, ultima: null }; }
}

function calcularDiasSemEstudo(ultima) {
    if (!ultima) return 99;
    const diff = new Date() - new Date(ultima);
    return Math.floor(diff / 86400000);
}

function domClass(d) { return d >= 70 ? 'dom-high' : d >= 45 ? 'dom-mid' : 'dom-low'; }
function barClass(d) { return d >= 70 ? 'barra-high' : d >= 45 ? 'barra-mid' : 'barra-low'; }

function diasParaData(dataStr) {
    if (!dataStr) return 999;
    const diff = new Date(dataStr) - new Date(new Date().toDateString());
    return Math.round(diff / 86400000);
}

// ── ONBOARDING ────────────────────────────────────────────────────────────
function getOnboarding() {
    try {
        const ob = JSON.parse(localStorage.getItem('studyai_onboarding') || '{}');
        return {
            tipoProva:  ob.tipo_prova   || null,
            objetivo:   ob.objetivo     || null,
            dataProva:  ob.data_prova   || null,
            horasMetaDia: parseFloat(ob.horas_por_dia) || 2,
            materiasDificeis: (ob.materias_dificuldade || [])
                .filter(m => m.nivel === 'alto' || m.nivel === 'médio')
        };
    } catch { return { horasMetaDia: 2, materiasDificeis: [] }; }
}

function labelRevisao(dias) {
    if (dias <= 0) return { texto: 'Revisar hoje', cls: 'rev-hoje' };
    if (dias === 1) return { texto: 'Amanhã', cls: 'rev-amanha' };
    if (dias <= 7) return { texto: `Em ${dias} dias`, cls: 'rev-semana' };
    return { texto: `${dias} dias`, cls: 'rev-futura' };
}

// ── SPARKLINE SVG ─────────────────────────────────────────────────────────
function sparkline(historico) {
    if (!historico || historico.length < 2) return '';
    const vals = historico.slice(-7).map(h => h.dominio || 0);
    const W = 60, H = 28;
    const min = Math.min(...vals), max = Math.max(...vals, min + 1);
    const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = H - ((v - min) / (max - min)) * (H - 4) - 2;
        return `${x},${y}`;
    }).join(' ');
    const last = vals[vals.length - 1];
    const col = last >= 70 ? '#00d4aa' : last >= 45 ? '#f59e0b' : '#f87171';
    return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
        <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
}

// ── EVOLUÇÃO SEMANAL ──────────────────────────────────────────────────────
function evoluçãoSemanal(perfil) {
    const dias = [];
    const hoje = new Date();
    for (let i = 6; i >= 0; i--) {
        const d = new Date(hoje); d.setDate(d.getDate() - i);
        const str = d.toISOString().slice(0,10);
        const label = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
        const isHoje = i === 0;

        // Verifica se houve sessão nesse dia
        let sessoes = 0;
        let dominioMedio = 0;
        let count = 0;
        for (const t of Object.values(perfil.temas || {})) {
            for (const h of (t.historico || [])) {
                if (h.data === str) {
                    sessoes++;
                    dominioMedio += h.dominio || 0;
                    count++;
                }
            }
        }
        if (count) dominioMedio = Math.round(dominioMedio / count);

        dias.push({ str, label, isHoje, sessoes, dominioMedio });
    }
    return dias;
}

// ── TIMELINE ──────────────────────────────────────────────────────────────
function buildTimeline(perfil) {
    const eventos = [];
    for (const [nome, t] of Object.entries(perfil.temas || {})) {
        for (const h of (t.historico || [])) {
            eventos.push({ data: h.data, tema: nome, dominio: h.dominio });
        }
    }
    return eventos.sort((a, b) => b.data.localeCompare(a.data)).slice(0, 8);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderizar(analise, perfil, streakData, ob, gami) {
    const container = document.getElementById('container');
    const hoje = new Date().toISOString().slice(0, 10);
    const { streak, ultima } = streakData;
    const diasSem = calcularDiasSemEstudo(ultima);
    const temas = perfil.temas || {};
    const temTemas = Object.keys(temas).length > 0;

    // ── Dados do onboarding ───────────────────────────────────────────────
    ob = ob || {};
    const horasMetaDia    = ob.horasMetaDia    || 2;
    const dataProva       = ob.dataProva       || null;
    const tipoProva       = ob.tipoProva && ob.tipoProva !== 'Não informado' ? ob.tipoProva : null;
    const materiasDif     = ob.materiasDificeis || [];
    const diasAteProva    = dataProva ? diasParaData(dataProva) : null;
    const horasTotaisRest = diasAteProva > 0 ? diasAteProva * horasMetaDia : null;
    const semanasRest     = diasAteProva > 0 ? Math.ceil(diasAteProva / 7) : null;

    // Temas difíceis do onboarding que ainda não foram estudados
    const sugestoes = materiasDif
        .filter(m => !temas[m.materia])
        .slice(0, 5);

            <div style="margin:28px 0 0;text-align:left;background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:20px 24px;">

    // Stats gerais
    const temasList = Object.entries(temas);

        .filter(([,t]) => (t.padroes_erro||[]).length)

    // Missão do dia — prioriza matérias difíceis do onboarding ainda não estudadas

        ${diasAteProva > 0 ? `

    ${renderXPBar(gami)}

    <!-- MISSÃO DO DIA -->

                const rev = t.proxima_revisao ? labelRevisao(diasParaData(t.proxima_revisao)) : null;

    <!-- DOIS LADOS: revisões + erros -->
    <div class="two-col">
        ${revisoes.length ? `
        <div class="section">
            <div class="section-title">📅 Revisões agendadas</div>

                ${revisoes.slice(0,6).map(r => {
                    const lbl = labelRevisao(r.dias);
                    return `<div class="revisao-row">

        ${erros.length ? `

            <div class="section-title">⚠️ Erros recorrentes</div>
            <div class="erros-lista">

                <div class="erro-item">

                        <div class="erro-tema">${e.tema}</div>
                        <div class="erro-texto">${e.erro}</div>
                    </div>

    ${renderBadges(gami)}

    <!-- TEMAS PRIORITÁRIOS (onboarding não estudados) -->

        <div class="section-title">🎯 Temas prioritários${tipoProva ? ' — ' + tipoProva : ''}</div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:6px 18px;">
            ${sugestoes.map(m => `

                <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;
                    background:${m.nivel==='alto'?'#ff4d4d':'#f59e0b'};

                    display:inline-block"></span>
                <span style="flex:1;font-size:13px;font-weight:700;color:#ddd">${m.materia}</span>
                <span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
                    color:${m.nivel==='alto'?'#ff4d4d88':'#f59e0b88'}">Dificuldade ${m.nivel}</span>
                <span style="font-size:11px;color:#333;background:#161616;border-radius:6px;padding:2px 8px;">Não iniciado</span>

    <!-- CRONOGRAMA ATÉ A PROVA -->
    ${semanasRest > 0 ? `

        <div class="section-title">📅 Cronograma — ${semanasRest} semana${semanasRest>1?'s':''} até ${tipoProva || 'a prova'}</div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:20px 24px;">
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
                <div style="flex:1;">
                    <div style="font-size:13px;color:#555;line-height:1.6">
                        Estudando <strong style="color:#00d4aa">${horasMetaDia}h/dia</strong> você tem
                        <strong style="color:#00d4aa">${horasTotaisRest}h totais</strong>
                        — suficiente para cobrir
                        <strong style="color:#f0f0f0">~${Math.min(Math.round(horasTotaisRest/2.5), Object.keys(temas).length + sugestoes.length)} temas</strong>.
                    </div>
                </div>
                <div style="text-align:center;background:#0d0d0d;border:1px solid #1e1e1e;
                    border-radius:12px;padding:12px 20px;flex-shrink:0;">
                    <div style="font-size:28px;font-weight:900;color:#f59e0b;line-height:1">${diasAteProva}</div>
                    <div style="font-size:10px;font-weight:700;color:#444;text-transform:uppercase">dias restantes</div>
                </div>
            </div>
            <!-- Barra de progresso até a prova -->
            <div style="margin-bottom:8px;">
                <div style="height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;">
                    <div style="height:100%;width:3%;background:linear-gradient(90deg,#00d4aa,#00bfa0);border-radius:3px;"></div>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#333;font-weight:600;">
                    <span>Hoje</span><span>${tipoProva || 'Prova'} 🎯</span>
                </div>
            </div>
            <!-- Prioridades por semana -->
            ${semanasRest <= 12 ? `
            <div style="margin-top:18px;">
                <div style="font-size:10px;font-weight:800;color:#2a2a2a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;">
                    Foco por semana
                </div>
                <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
                    ${Array.from({length: Math.min(semanasRest,6)}, (_, i) => {

                        const allPriority = [
                            ...materiasDif.map(m => ({ nome: m.materia, nivel: m.nivel })),
                            ...temasList.filter(([,t]) => !t.concluido).map(([n]) => ({ nome: n, nivel: 'médio' }))

                        const temasSemana = allPriority.slice(i * 2, i * 2 + 2);
                        const corSemana = i === 0 ? '#ff4d4d' : i <= 2 ? '#f59e0b' : '#00d4aa';

    <!-- HISTÓRICO -->
    ${timeline.length ? `

// ── GAMIFICAÇÃO ───────────────────────────────────────────────────────────────

const NIVEIS = [
    { n:1, nome:'Iniciante',  min:0,    max:200  },
    { n:2, nome:'Estudante',  min:200,  max:500  },
    { n:3, nome:'Dedicado',   min:500,  max:1000 },
    { n:4, nome:'Expert',     min:1000, max:2000 },
    { n:5, nome:'Mestre',     min:2000, max:99999},
];

const BADGES_DEF = [
    { id:'first_diag', icon:'🎯', nome:'Primeiro Passo',   desc:'Fez o primeiro diagnóstico'     },
    { id:'streak_3',   icon:'🔥', nome:'3 Dias Seguidos',  desc:'Estudou 3 dias consecutivos'    },
    { id:'streak_7',   icon:'🏅', nome:'7 Dias Seguidos',  desc:'Estudou 7 dias consecutivos'    },
    { id:'streak_30',  icon:'🏆', nome:'Imparável',        desc:'30 dias consecutivos de estudo' },
    { id:'dom_1',      icon:'💪', nome:'Primeiro Domínio', desc:'Dominou o primeiro tema'        },
    { id:'dom_5',      icon:'⭐', nome:'Veterano',         desc:'Dominou 5 temas'                },
    { id:'dom_10',     icon:'💎', nome:'Expert Supremo',   desc:'Dominou 10 temas'               },
    { id:'xp_500',     icon:'🌟', nome:'500 XP',           desc:'Conquistou 500 pontos de XP'    },
    { id:'xp_1000',    icon:'🎖', nome:'1000 XP',          desc:'Conquistou 1000 pontos de XP'   },
    { id:'missao_7',   icon:'🧩', nome:'7 Missões',        desc:'Completou 7 missões diárias'    },
];

const MISSOES_POOL = [
    { titulo:'Analise um material',     desc:'Faça o diagnóstico de um PDF ou foto hoje.',         xp:50  },
    { titulo:'Revise um tema difícil',  desc:'Estude uma matéria de dificuldade alta.',            xp:80  },
    { titulo:'Assista 2 vídeos',        desc:'Assista e avalie pelo menos 2 vídeos.',              xp:60  },
    { titulo:'Estude por 1 hora',       desc:'Faça ao menos uma sessão sólida de estudo hoje.',    xp:40  },
    { titulo:'Evolua um tema',          desc:'Aumente em 10% o domínio de qualquer tema.',        xp:100 },
];

function getGami() {
    try { return JSON.parse(localStorage.getItem(GAMI_KEY) || '{}'); }
    catch { return {}; }
}
function saveGami(g) { localStorage.setItem(GAMI_KEY, JSON.stringify(g)); }

function calcNivel(xp) {
    return NIVEIS.find(n => xp >= n.min && xp < n.max) || NIVEIS[NIVEIS.length-1];
}

function getMissaoHoje(ob) {
    const g = getGami();
    const hoje = new Date().toISOString().slice(0,10);
    if (g.missao && g.missao.data === hoje) return g.missao;
    let missao;
    const mat = (ob?.materiasDificeis || []);
    if (mat.length) {
        missao = {
            titulo: `Estude ${mat[0].materia}`,
            desc: `Você tem dificuldade ${mat[0].nivel} nessa matéria${ob?.tipoProva ? ' — importante para o ' + ob.tipoProva : ''}. Dedique ${ob?.horasMetaDia || 2}h hoje.`,
            xp: 100, data: hoje, concluida: false
        };
    } else {
        const base = MISSOES_POOL[new Date().getDate() % MISSOES_POOL.length];
        missao = { ...base, data: hoje, concluida: false };
    }
    g.missao = missao;
    saveGami(g);
    return missao;
}

function checkBadges(g, perfil, streakVal) {
    const earned = new Set(g.badges || []);
    const dominados = Object.values(perfil.temas || {}).filter(t => t.concluido).length;
    if (Object.keys(perfil.temas||{}).length > 0) earned.add('first_diag');
    if (streakVal >= 3)  earned.add('streak_3');
    if (streakVal >= 7)  earned.add('streak_7');
    if (streakVal >= 30) earned.add('streak_30');
    if (dominados >= 1)  earned.add('dom_1');
    if (dominados >= 5)  earned.add('dom_5');
    if (dominados >= 10) earned.add('dom_10');
    if ((g.xp||0) >= 500)  earned.add('xp_500');
    if ((g.xp||0) >= 1000) earned.add('xp_1000');
    if ((g.missoes_concluidas||0) >= 7) earned.add('missao_7');
    g.badges = [...earned];
    return g;
}

function syncXPFromPerfil(g, perfil) {
    // Bootstrap XP para usuários sem gami ainda
    if ((g.xp || 0) === 0) {
        let xp = 0;
        for (const t of Object.values(perfil.temas || {})) {
            xp += (t.sessoes||0) * 30;
            if (t.concluido) xp += 100;
        }
        g.xp = xp;
    }
    return g;
}

function concluirMissao() {
    let g = getGami();
    if (!g.missao || g.missao.concluida) return;
    g.missao.concluida = true;
    g.xp = (g.xp||0) + g.missao.xp;
    g.missoes_concluidas = (g.missoes_concluidas||0) + 1;
    g.historico_xp = g.historico_xp || [];
    g.historico_xp.push({ data: new Date().toISOString().slice(0,10), xp: g.missao.xp, motivo: 'Missão do dia' });
    saveGami(g);
    inicializar();
}

function renderXPBar(g) {
    const xp     = g.xp || 0;
    const nivel  = calcNivel(xp);
    const prox   = NIVEIS.find(n => n.n === nivel.n + 1);
    const pct    = prox ? Math.round(((xp - nivel.min) / (prox.min - nivel.min)) * 100) : 100;
    const falta  = prox ? prox.min - xp : 0;
    const missoes = g.missoes_concluidas || 0;
    const badges  = (g.badges||[]).length;
    return `
    <div class="xp-section">
        <div class="xp-nivel-badge">
            <div class="xp-nivel-num">${nivel.n}</div>
            <div class="xp-nivel-txt">nível</div>
        </div>
        <div class="xp-info">
            <div class="xp-top">
                <span class="xp-nome-nivel">${nivel.nome}</span>
                <span class="xp-pts">${xp} XP</span>
            </div>
            <div class="xp-bar-bg">
                <div class="xp-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="xp-sub">
                ${prox ? `<span>${falta} XP para ${prox.nome}</span>` : '<span>Nível máximo atingido 🏆</span>'}
                <span>🧩 ${missoes} missões</span>
                <span>🏅 ${badges} badges</span>
            </div>
        </div>
    </div>`;
}

function renderCalendario(perfil) {
    const hoje = new Date();
    const dias = [];
    for (let i = 55; i >= 0; i--) {
        const d = new Date(hoje); d.setDate(d.getDate() - i);
        const str = d.toISOString().slice(0,10);
        let sessoes = 0;
        for (const t of Object.values(perfil.temas||{})) {
            for (const h of (t.historico||[])) {
                if (h.data === str) sessoes++;
            }
        }
        dias.push({ str, sessoes, isHoje: i === 0 });
    }
    const cells = dias.map(d => {
        const lvl = d.sessoes === 0 ? '' : d.sessoes === 1 ? 'l1' : d.sessoes === 2 ? 'l2' : d.sessoes >= 3 ? 'l3' : 'l4';
        return `<div class="cal-day ${lvl} ${d.isHoje?'today':''}" title="${d.str}: ${d.sessoes} sessão(ões)"></div>`;
    }).join('');
    return `
    <div class="section">
        <div class="section-title">📅 Calendário de atividades — 56 dias</div>
        <div class="cal-wrap">
            <div class="cal-grid">${cells}</div>
            <div class="cal-legend">
                <span>Menos</span>
                <div class="cal-leg-box" style="background:#1a1a1a"></div>
                <div class="cal-leg-box" style="background:#0a3326"></div>
                <div class="cal-leg-box" style="background:#0f6647"></div>
                <div class="cal-leg-box" style="background:#00d4aa"></div>
                <span>Mais</span>
            </div>
        </div>
    </div>`;
}

function renderBadges(g) {
    const earned = new Set(g.badges||[]);
    const items = BADGES_DEF.map(b => `
        <div class="badge-item ${earned.has(b.id)?'earned':'locked'}">
            <div class="badge-icon">${b.icon}</div>
            <div class="badge-info">
                <div class="badge-nome">${b.nome}</div>
                <div class="badge-desc">${b.desc}</div>
            </div>
        </div>`).join('');
    return `
    <div class="section">
        <div class="section-title">🏅 Conquistas — ${earned.size} de ${BADGES_DEF.length}</div>
        <div class="badges-grid">${items}</div>
    </div>`;
}

// ── INICIALIZAR ────────────────────────────────────────────────────────────
async function inicializar() {
    const perfil     = getPerfil();
    const streakData = getStreak();
    const ob         = getOnboarding();
    const diasSem    = calcularDiasSemEstudo(streakData.ultima);
    const temTemas   = Object.keys(perfil.temas || {}).length > 0;

    // Sincroniza gamificação
    let gami = getGami();
    gami = syncXPFromPerfil(gami, perfil);
    gami = checkBadges(gami, perfil, streakData.streak || 0);
    // Sincroniza streak com gami
    gami.streak = streakData.streak || 0;
    saveGami(gami);

    if (!temTemas) {
        renderizar({}, perfil, streakData, ob, gami);
        return;
    }

    try {
        const res = await fetch('/progresso-analise', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ perfil, streak: streakData.streak, dias_sem_estudo: diasSem })
        });
        const analise = await res.json();
        renderizar(analise, perfil, streakData, ob, gami);
    } catch {
        renderizar({
            proxima_missao: {}, revisoes_agendadas: [],
            principais_dificuldades: [], ranking_dominio: [],
            mensagem: 'Continue estudando — cada sessão conta.', alerta: null
        }, perfil, streakData, ob, gami);
    }
}

inicializar();
</script>
